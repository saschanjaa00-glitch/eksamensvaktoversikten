<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lærervakter - Teacher Schedule Parser</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📅 Lærervakter</h1>
    <p class="subtitle">Teacher Schedule Parser</p>

    <div class="upload-section">
      <form id="uploadForm">
        <div class="form-group">
          <label for="file">Upload Excel File:</label>
          <input type="file" id="file" name="file" accept=".xlsx,.xls" required>
        </div>
        <div class="form-group">
          <label for="sheetName">Sheet Name (optional):</label>
          <input type="text" id="sheetName" name="sheetName" placeholder="e.g., Lærervakter" value="Lærervakter">
        </div>
        <div class="form-group">
          <label for="filterDate">Filter from date (optional):</label>
          <input type="text" id="filterDate" name="filterDate" placeholder="DD.MM.YYYY">
        </div>
        <button type="submit" class="btn-upload">Upload & Process</button>
      </form>
    </div>

    <div id="loading" class="loading" style="display: none;">
      <p>Processing your file...</p>
    </div>

    <div id="error" class="error" style="display: none;"></div>

    <div id="results" class="results" style="display: none;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <div style="display: flex; gap: 12px; align-items: center; flex: 1;">
          <div style="display: flex; gap: 6px;">
            <button id="tabTeacherBtn" class="tab-btn active" type="button">Teacher Schedule</button>
            <button id="tabDateBtn" class="tab-btn" type="button">Schedule by Date</button>
            <button id="tabMultiBtn" class="tab-btn" type="button">Multi-Sheet Export</button>
          </div>
        </div>
        <div style="display: flex; gap: 8px;">
          <button id="exportPdfBtn" class="btn-export">📥 Export as PDF</button>
          <button id="copyOneNoteBtn" class="btn-export">📔 Copy to OneNote</button>
          <button id="copyDateOneNoteBtn" class="btn-export" style="display: none;">📔 Copy to OneNote</button>
          <button id="saveDatePngBtn" class="btn-export" style="display: none;">🖼️ Save as PNG</button>
          <button id="copyMultiOneNoteBtn" class="btn-export" style="display: none;">📔 Copy to OneNote</button>
          <button id="saveMultiPngBtn" class="btn-export" style="display: none;">🖼️ Save as PNG</button>
        </div>
      </div>

      <div id="teacherTab" style="display: block;">
        <div id="resultsContent"></div>
      </div>

      <div id="dateTab" style="display: none;">
        <div class="form-group" style="margin-bottom: 16px; max-width: 300px;">
          <label for="sheetSelector">Select Date/Sheet:</label>
          <select id="sheetSelector" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem;">
            <option value="">-- Select a sheet --</option>
          </select>
        </div>
        <div style="margin-bottom: 16px;">
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <input type="checkbox" id="dateShowHiddenCols" style="cursor: pointer;">
            <span>Show Fag and Hovedvakt columns</span>
          </label>
        </div>
        <div id="dateTabContent" style="display: none;">
          <div style="overflow-x: auto;">
            <table id="dateScheduleTable" class="date-schedule-table" style="width: 100%; border-collapse: collapse;"></table>
          </div>
        </div>
      </div>

      <div id="multiTab" style="display: none;">
        <div class="form-group" style="margin-bottom: 16px;">
          <label>Select Sheets to Include:</label>
          <label id="selectAllLabel" style="display: flex; align-items: center; gap: 8px; cursor: pointer; margin-bottom: 8px; font-weight: bold;">
            <input type="checkbox" id="selectAllCheckbox" style="cursor: pointer;">
            <span>Select All</span>
          </label>
          <div id="multiSheetCheckboxes" style="display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
          </div>
          <button id="loadMultiSheetsBtn" class="btn-export" style="margin-top: 12px; width: 100%;">Load Selected Sheets</button>
        </div>
        <div style="margin-bottom: 16px;">
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <input type="checkbox" id="multiShowHiddenCols" style="cursor: pointer;">
            <span>Show Fag and Hovedvakt columns</span>
          </label>
        </div>
        <div id="multiTabContent" style="display: none; margin-top: 16px;">
          <div style="overflow-x: auto;">
            <table id="multiScheduleTable" class="date-schedule-table" style="width: 100%; border-collapse: collapse;"></table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="script.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>
</html>
