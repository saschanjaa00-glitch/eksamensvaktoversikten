<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lærervakter - Teacher Schedule Parser</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📅 Lærervakter</h1>
    <p class="subtitle">Teacher Schedule Parser</p>

    <div class="upload-section">
      <form id="uploadForm">
        <div class="form-group">
          <label for="file">Upload Excel File:</label>
          <input type="file" id="file" name="file" accept=".xlsx,.xls" required>
        </div>
        <div class="form-group">
          <label for="sheetName">Sheet Name (optional):</label>
          <input type="text" id="sheetName" name="sheetName" placeholder="e.g., Lærervakter" value="Lærervakter">
        </div>
        <div class="form-group">
          <label for="filterDate">Filter from date (optional):</label>
          <input type="date" id="filterDate" name="filterDate">
        </div>
        <button type="submit" class="btn-upload">Upload & Process</button>
      </form>
    </div>

    <div id="loading" class="loading" style="display: none;">
      <p>Processing your file...</p>
    </div>

    <div id="error" class="error" style="display: none;"></div>

    <div id="results" class="results" style="display: none;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <h2 style="margin: 0;">Teacher Schedules</h2>
        <div style="display: flex; gap: 8px;">
          <button id="exportPdfBtn" class="btn-export">📥 Export as PDF</button>
          <button id="copyOneNoteBtn" class="btn-export">📔 Copy to OneNote</button>
        </div>
      </div>

      <div class="tab-bar">
        <button id="tabScheduleBtn" class="tab-btn active" type="button">Schedule</button>
        <button id="tabEditorBtn" class="tab-btn" type="button">Sheet Editor</button>
      </div>

      <div id="scheduleTab" class="tab-panel">
        <div id="resultsContent"></div>
      </div>

      <div id="editorTab" class="tab-panel" style="display: none;">
        <div class="editor-toolbar">
          <p>Edit cells directly in the table below, then download the updated file.</p>
          <button id="downloadEditedBtn" class="btn-export" type="button">💾 Download Edited Excel</button>
        </div>
        <div id="sheetEditorContainer" class="sheet-editor-container"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="script.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</body>
</html>
